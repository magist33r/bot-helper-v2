services:
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Samara}
      - TZ=${TZ:-Europe/Samara}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      - NODE_FUNCTION_ALLOW_BUILTIN=${NODE_FUNCTION_ALLOW_BUILTIN:-https,dns}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED:-false}
      - EXECUTIONS_DATA_PRUNE=${EXECUTIONS_DATA_PRUNE:-true}
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE:-168}
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=${EXECUTIONS_DATA_PRUNE_MAX_COUNT:-10000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://aitunnel.ru/v1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_BOT_TOKEN=${TELEGRAM_ADMIN_BOT_TOKEN}
      - TG_WEBHOOK_SECRET=${TG_WEBHOOK_SECRET}
      - TG_ADMIN_WEBHOOK_SECRET=${TG_ADMIN_WEBHOOK_SECRET}
      - INTERNAL_WEBHOOK_SECRET=${INTERNAL_WEBHOOK_SECRET}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - KNOWLEDGE_INGESTION_WEBHOOK_URL=${KNOWLEDGE_INGESTION_WEBHOOK_URL}
      - KNOWLEDGE_SEED_TEXT=${KNOWLEDGE_SEED_TEXT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:




